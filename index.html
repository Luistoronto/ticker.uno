<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticker Uno - Muy Pronto</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #000000; /* Fondo negro para que el logo blanco resalte */
            color: #ffffff; /* Texto blanco */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Ocupa el 100% de la altura de la ventana */
            text-align: center;
            flex-direction: column; /* Para apilar el logo y el texto */
        }

        .container {
            max-width: 90%; /* Ancho máximo del contenedor */
            padding: 20px;
        }

        .logo {
            margin-bottom: 40px; /* Espacio debajo del logo */
        }

        .logo img {
            max-width: 300px; /* Tamaño máximo del logo */
            height: auto;
            display: block; /* Asegura que no haya espacios extra debajo de la imagen */
            margin: 0 auto; /* Centra la imagen */
        }

        h1 {
            font-size: 3em; /* Tamaño de fuente grande para "Muy Pronto" */
            margin-top: 0;
            letter-spacing: 2px; /* Espaciado entre letras */
        }

        p {
            font-size: 1.2em; /* Tamaño de fuente para el párrafo */
            opacity: 0.8; /* Ligeramente transparente */
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .logo img {
                max-width: 200px; /* Reduce el tamaño del logo en pantallas pequeñas */
            }
            h1 {
                font-size: 2.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="Logo TickerUno.jpg" alt="Ticker Uno Logo">
        </div>
        <h1>¡Muy Pronto!</h1>
        <p>Estamos trabajando duro para ofrecerte algo increíble. ¡Mantente atento!</p>
        </div>
</body>
</html>
